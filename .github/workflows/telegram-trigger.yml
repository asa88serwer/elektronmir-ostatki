name: Обновление остатков по команде в Telegram

on:
  schedule:
    - cron: '*/5 * * * *'  # проверка новых сообщений каждые 5 минут
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: telegram-trigger
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests xlrd openpyxl google-api-python-client google-auth

      - name: Опрос Telegram
        id: poll
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python telegram_poll.py

      - name: Сохранить позицию опроса
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/telegram_offset.txt
          if git diff --cached --quiet; then
            echo "Offset не изменился"
          else
            git commit -m "chore: telegram offset"
            git push
          fi

      - name: Скачивание XLS с Google Диска
        if: steps.poll.outputs.triggered == 'true'
        env:
          GOOGLE_SA_KEY: ${{ secrets.GOOGLE_SA_KEY }}
        run: python download_gdrive.py

      - name: Генерация HTML
        if: steps.poll.outputs.triggered == 'true'
        run: python build_html.py

      - name: Коммит и пуш остатков
        if: steps.poll.outputs.triggered == 'true'
        run: |
          git add index.html "Общие остатки - Корпоративный.html"
          if git diff --cached --quiet; then
            echo "Нет изменений в остатках"
          else
            git commit -m "Обновление остатков по команде Telegram $(date -u +%d.%m.%Y\ %H:%M)"
            git push
          fi

      - name: Ответ в Telegram
        if: steps.poll.outputs.triggered == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="Готово! Остатки обновлены и опубликованы."
