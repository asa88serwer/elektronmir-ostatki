name: Обновление остатков

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1-5'  # Пн-Пт в 09:00 UTC (12:00 МСК)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Установка зависимостей
        run: pip install xlrd openpyxl google-api-python-client google-auth

      - name: Скачивание XLS с Google Диска
        if: env.GOOGLE_SA_KEY != ''
        env:
          GOOGLE_SA_KEY: ${{ secrets.GOOGLE_SA_KEY }}
        run: python download_gdrive.py

      - name: Генерация HTML
        run: python build_html.py --xls

      - name: Коммит и пуш
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html "Общие остатки - Корпоративный.html"
          if git diff --cached --quiet; then
            echo "Нет изменений"
          else
            git commit -m "Обновление остатков $(date -u +%d.%m.%Y)"
            git push
          fi
